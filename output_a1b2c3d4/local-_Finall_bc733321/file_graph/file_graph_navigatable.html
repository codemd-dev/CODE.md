          }
        }
        // fallback: any node in the full graph with hidden edges
        for (const [nodeId] of nodeById) {
          if (visited.has(nodeId)) continue;
          const incident = [
            ...(outgoing.get(nodeId) || []),
            ...(incoming.get(nodeId) || []),
          ];
          const hasHidden = incident.some(edge => {
            const edgeId = `${edge.src}->${edge.dst}`;
            const otherId = edge.src === nodeId ? edge.dst : edge.src;
            return !cy.getElementById(edgeId).length || !cy.getElementById(otherId).length;
          });
          if (hasHidden) return nodeId;
        }
        return null;
      }

      let lastTap = { id: "", time: 0 };
      cy.on("tap", "node", evt => {
        const id = evt.target.id();
        const now = Date.now();
        const isDoubleTap = lastTap.id === id && (now - lastTap.time) < 420;
        lastTap = { id, time: now };
        if (!isDoubleTap) {
          statusEl.textContent = `${data.title}: selected ${compactLabel(nodeById.get(id) || id)}. Double-click a node to show its immediate incoming/outgoing links.`;
          return;
        }
        
        expandedNodes.add(id);
        const added = addMissingElements(oneStepElementsFor(id));
        if (added) {
          relayout(true, id);
          statusEl.textContent = `${data.title}: added the next linked node/edge from ${compactLabel(nodeById.get(id) || id)} (${cy.nodes().length} nodes, ${cy.edges().length} edges). Double-click again to reveal the next link.`;
          return;
        }
        const next = findNextExpansionTarget(id);
        if (next) {
          expandedNodes.add(next);
          addMissingElements(oneStepElementsFor(next));
          relayout(true, next);
          statusEl.textContent = `${data.title}: ${compactLabel(nodeById.get(id) || id)} fully expanded. Continuing from ${compactLabel(nodeById.get(next) || next)} (${cy.nodes().length} nodes, ${cy.edges().length} edges). Double-click to keep going.`;
        } else {
          statusEl.textContent = `${data.title}: all reachable nodes from ${compactLabel(nodeById.get(id) || id)} are now visible (${cy.nodes().length} nodes, ${cy.edges().length} edges).`;
        }
      });

      statusEl.textContent = `${data.title}: showing immediate incoming/outgoing links for ${compactLabel(nodeById.get(firstRoot) || firstRoot)} (${cy.nodes().length} nodes, ${cy.edges().length} edges). Double-click a node to expand the road.`;
      requestAnimationFrame(() => relayout(true, firstRoot));
    
    }).catch(err => {
      showGraphError(err);
    });
  </script>
</body>
</html>
