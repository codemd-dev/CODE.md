<body>

<h1>TaskChat</h1>
<p>View your Google Tasks and chat with them using ChatGPT.</p>

<!-- LOGIN BUTTON -->
<button onclick="login()">Sign in with Google Tasks</button>

<!-- CHATGPT BUTTON -->
<button style="background:#10a37f; margin-left:10px;" onclick="openGPT()">
    Chat with my Tasks
</button>

<!-- ADD TASK -->
<div id="addTaskBox">
    <input id="addTaskInput" placeholder="New task title">
    <button onclick="addTask()">Add Task</button>
</div>
    

<style>
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        margin-top: 10px;
        font-size: 25px;
    }

    th, td {
        padding: 12px;
        border: 1px solid #ddd;
        vertical-align: top;
    }

    th {
        background: #f5f5f5;
        font-weight: bold;
        text-align: left;
    }

    td {
        text-align: left;
    }

    .star {
        cursor: pointer;
        font-size: 20px;
    }

    .delete-btn {
        background: #d9534f;
        color: white;
        padding: 6px 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .delete-btn:hover {
        background: #c9302c;
    }
</style>

<!-- MAIN TASK VIEW -->
<div style="flex:1;">
    <h2 id="currentListTitle">Tasks</h2>
    <table id="taskTable">
    <thead>
        <tr>
            <th style="width:60px;">Done</th>
            <th style="width:60px;">Star</th>
            <th>Title</th>
            <th>Details</th>
            <th style="width:150px;">Due</th>
            <th style="width:120px;">Actions</th>
        </tr>
    </thead>
    <tbody id="taskTableBody"></tbody>
</table>

    <h3 style="margin-top:30px; cursor:pointer;" onclick="toggleCompleted()">
        Completed ▼
    </h3>
    <table id="completedTable" style="display:none;">
        <thead>
            <tr>
                <th style="width:60px;">Done</th>
                <th style="width:60px;">Star</th>
                <th>Title</th>
                <th>Details</th>
                <th style="width:150px;">Due</th>
                <th style="width:120px;">Actions</th>
            </tr>
        </thead>
        <tbody id="completedTableBody"></tbody>
    </table>
</div>


<script>

//const API_BASE = "http://127.0.0.1:8000";

//const API_BASE = "https://chatapi.progduct.com";

const API_BASE = "https://api.finallydoneapp.com";

let currentListId = "@default";

function login() {
    window.location.href = API_BASE + "/oauth/google/start";
}

//https://chatgpt.com/g/g-69e2d6e331308191bc127f2a960e867a-manage-tasks-todos-reminders-gtasks

function openGPT() {
    window.open("https://chatgpt.com/g/g-69e2d6e331308191bc127f2a960e867a-manage-tasks-todos-reminders-gtasks", "_blank");
}

async function loadLists() {
    const res = await fetch(API_BASE + "/list-task-lists");
    const data = await res.json();

    const container = document.getElementById("taskLists");
    container.innerHTML = "";

    if (!data.items) return;

    data.items.forEach(list => {
        const div = document.createElement("div");
        div.style.padding = "8px";
        div.style.cursor = "pointer";
        div.style.borderRadius = "6px";

        div.innerHTML = list.title;

        div.onclick = () => {
            currentListId = list.id;
            document.getElementById("currentListTitle").innerText = list.title;
            loadTasks();
        };

        container.appendChild(div);
    });
}

function toggleCompleted() {
    const table = document.getElementById("completedTable");
    table.style.display = table.style.display === "none" ? "table" : "none";
}


async function loadTasks() {
    const res = await fetch(API_BASE + "/list-tasks?listId=" + currentListId);
    const data = await res.json();

    const tbody = document.getElementById("taskTableBody");
    const completedBody = document.getElementById("completedTableBody");

    tbody.innerHTML = "";
    completedBody.innerHTML = "";

    if (!data.items) return;

    data.items.forEach(task => {
        const isCompleted = task.status === "completed";

        const row = document.createElement("tr");
        row.innerHTML = `
            <td>
                <input type="checkbox" ${isCompleted ? "checked" : ""} 
                    onclick="toggleTaskStatus('${task.id}', ${isCompleted})">
            </td>

            <td>
                <span class="star" onclick="starTask('${task.id}')">
                    ${task.importance === "high" ? "⭐" : "☆"}
                </span>
            </td>

            <td>${task.title || "(no title)"}</td>
            <td>${task.notes || ""}</td>
            <td>${task.due || ""}</td>

            <td>
                <button class="delete-btn" onclick="deleteTask('${task.id}')">Delete</button>
            </td>
        `;

        if (isCompleted) {
            completedBody.appendChild(row);
        } else {
            tbody.appendChild(row);
        }
    });
}


async function addTask() {
    const title = document.getElementById("addTaskInput").value;
    if (!title) return alert("Enter a task title");

    await fetch(API_BASE + "/create-task?title=" + encodeURIComponent(title) + "&listId=" + currentListId, {
        method: "POST"
    });

    document.getElementById("addTaskInput").value = "";
    loadTasks();
}

async function toggleTaskStatus(id, isCompleted) {
    const endpoint = isCompleted ? "/uncomplete-task/" : "/complete-task/";
    await fetch(API_BASE + endpoint + id + "?listId=" + currentListId, { method: "POST" });
    loadTasks();
}

async function starTask(id) {
    await fetch(API_BASE + "/star-task/" + id + "?listId=" + currentListId, { method: "POST" });
    loadTasks();
}

async function deleteTask(id) {
    await fetch(API_BASE + "/delete-task/" + id + "?listId=" + currentListId, { method: "DELETE" });
    loadTasks();
}

function toggleCompleted() {
    const section = document.getElementById("completedList");
    section.style.display = section.style.display === "none" ? "block" : "none";
}

loadLists();
loadTasks();
</script>

</body>
