                label = parts.slice(-2).join(".");
            } else if (parts.length) {
                label = parts[0];
            }
            return (label || raw || "").slice(0, 42);
        };
        const addNode = raw => {
            const id = sanitize(raw);
            nodeSet.add(id);
            nodeLabels[id] = String(providedNodeLabels[String(raw)] || raw);
            return id;
        };
        const addEdge = (src, dst, extra = {}) => {
            nodeSet.add(src);
            nodeSet.add(dst);
            edges.push({
                data: {
                    id: `edge_${edgeIndex++}_${src}_${dst}`,
                    source: src,
                    target: dst,
                    ...extra
                }
            });
        };

        rawNodes.forEach(node => addNode(node));

        // 0. Cytoscape element format
        if (rawEdges[0] && rawEdges[0].data && rawEdges[0].data.source && rawEdges[0].data.target) {
            rawEdges.forEach(el => {
                const src = addNode(el.data.source);
                const dst = addNode(el.data.target);
                addEdge(
                    src,
                    dst,
                    {
                        order: el.data.order || "",
                        line: el.data.line || "",
                        label: el.data.label || ""
                    }
                );
            });
        }
        // -------------------------------
        // 1. JAVALANG FORMAT (array edges)
        // -------------------------------
        else if (Array.isArray(rawEdges[0])) {
            rawEdges.forEach(([rawSrc, rawDst, order, line]) => {
                const src = addNode(rawSrc);
                const dst = addNode(rawDst);
                const edgeLabel = providedEdgeLabels[`${rawSrc}->${rawDst}`] || providedEdgeLabels[`${src}->${dst}`] || "";

                addEdge(src, dst, {
                    order: order || "",
                    line: line || "",
                    label: edgeLabel || (line && order ? `L${line} (#${order})` : (order ? `#${order}` : ""))
                });
            });
        }
        // -------------------------------
        // 2. JOERN ORDERED FORMAT (method + calls[])
        // -------------------------------
        else if (rawEdges[0] && rawEdges[0].method && rawEdges[0].calls) {
            rawEdges.forEach(item => {
                const caller = addNode(item.method);

                item.calls.forEach(call => {
                    const callee = addNode(call.callee_fullName);
                    const order = call.order || "";
                    const line = call.line || "";

                    addEdge(caller, callee, {
                        order: order,
                        line: line,
                        label: line && order ? `L${line} (#${order})` : ""
                    });
                });
            });
        }
        // -------------------------------
        // 3. JOERN FORMAT (object edges)
        // -------------------------------
        else if (rawEdges[0] && rawEdges[0].caller && rawEdges[0].callee) {
            rawEdges.forEach(edge => {
                const src = addNode(edge.caller);
                const dst = addNode(edge.callee);

                addEdge(src, dst, { order: "", line: "" });
            });
        }

        if (edges.length === 0 && nodeSet.size === 0) {
            statusEl.textContent = `No renderable graph edges found in ${GRAPH_JSON}.`;
            return;
        }

        const graphElements = [];
        const isFileDependencyGraph = graphMode === "file_dependency_graph";

        // -------------------------------
        // 3. ADD NODES BEFORE EDGES
        // -------------------------------
        nodeSet.forEach(id => {
            graphElements.push({
                data: {
                    id,
                    label: (graphMode === "search_graph" || isFileDependencyGraph) ? compactLabel(nodeLabels[id] || id) : (nodeLabels[id] || id),
                    fullLabel: nodeLabels[id] || id
                }
            });
        });
        graphElements.push(...edges);
        const isLargeGraph = graphElements.length > 1000;
        const isSearchGraph = graphMode === "search_graph";
        const isOrderedGraph = !isLargeGraph && !isSearchGraph && !isFileDependencyGraph;
        const graphFontSize = isLargeGraph ? "0px" : (isSearchGraph ? "4px" : (isFileDependencyGraph ? "7px" : "18px"));
        const edgeFontSize = isLargeGraph ? "0px" : (isSearchGraph ? "3px" : (isFileDependencyGraph ? "4px" : "14px"));
        const nodeSize = isLargeGraph ? 10 : (isSearchGraph ? 5 : (isFileDependencyGraph ? 8 : 20));
        const textMaxWidth = isSearchGraph ? 34 : (isFileDependencyGraph ? 72 : 180);

        // -------------------------------
        // 4. BUILD CYTOSCAPE GRAPH
        // -------------------------------
        try {
            const cy = cytoscape({
                container: document.getElementById("cy"),
                elements: graphElements,
                style: [
                    {
                        selector: "node",
                        style: {
                            "label": "data(label)",
                            "background-color": "#0074D9",
                            "color": "#000",
                            "font-size": graphFontSize,
                            "text-valign": "center",
                            "text-halign": isFileDependencyGraph ? "center" : "right",
                            "text-margin-x": isSearchGraph ? 1 : (isFileDependencyGraph ? 0 : 4),
                            "text-margin-y": isFileDependencyGraph ? 9 : 0,
                            "text-wrap": "wrap",
                            "text-max-width": textMaxWidth,
                            "width": nodeSize,
                            "height": nodeSize,
                            "border-width": isSearchGraph ? 1 : 0,
                            "border-color": "#ffffff"
                        }
                    },
                    {
                        selector: "edge",
                        style: {
                            "label": "data(label)",
                            "width": isLargeGraph ? 0.6 : (isSearchGraph ? 0.4 : (isFileDependencyGraph ? 0.7 : 1)),
                            "line-color": "#aaa",
                            "opacity": isLargeGraph ? 0.45 : (isSearchGraph ? 0.65 : 1),
                            "target-arrow-color": "#aaa",
                            "target-arrow-shape": "triangle",
                            "curve-style": isOrderedGraph ? "taxi" : (isSearchGraph ? "straight" : "bezier"),
                            "taxi-direction": "horizontal",
                            "taxi-turn": "50%",
                            "taxi-turn-min-distance": 10,
                            "font-size": edgeFontSize,
                            "color": "red",
                            "text-margin-y": isSearchGraph ? -2 : (isFileDependencyGraph ? -4 : -10)
                        }
                    }
                ]
            });

            // -------------------------------
            // Ordered tiered layout (default mode only): levels nodes
            // left-to-right by call depth, and within each level stacks
            // them top-to-bottom by ascending call order/line so the
            // taxi (L-shaped) edges above connect callers/callees in order.
            // -------------------------------
            function edgeOrderValue(edge) {
                const order = Number(edge.data("order"));
                if (Number.isFinite(order)) return order;
                const line = Number(edge.data("line"));
                return Number.isFinite(line) ? line : Number.MAX_SAFE_INTEGER;
            }

            function applyOrderedTierLayout() {
                const nodes = cy.nodes();
                if (!nodes.length) return;
                const indegree = new Map();
                nodes.forEach(node => indegree.set(node.id(), 0));
                cy.edges().forEach(edge => indegree.set(edge.target().id(), (indegree.get(edge.target().id()) || 0) + 1));
                let roots = nodes.filter(node => (indegree.get(node.id()) || 0) === 0);
                if (!roots.length) roots = nodes.slice(0, 1);

                const levels = new Map();
                const queue = [];
                roots.forEach(node => {
                    levels.set(node.id(), 0);
                    queue.push(node.id());
                });
                let guard = 0;
                while (queue.length && guard < 20000) {
                    guard++;
                    const id = queue.shift();
                    const level = levels.get(id) || 0;
                    cy.getElementById(id).outgoers("edge").forEach(edge => {
                        const targetId = edge.target().id();
                        const nextLevel = level + 1;
                        if (!levels.has(targetId) || nextLevel > levels.get(targetId)) {
                            levels.set(targetId, nextLevel);
                            if (nextLevel < 200) queue.push(targetId);
                        }
                    });
                }
                nodes.forEach(node => {
                    if (!levels.has(node.id())) levels.set(node.id(), 0);
                });

                const minIncomingOrder = new Map();
                cy.edges().forEach(edge => {
                    const targetId = edge.target().id();
                    const value = edgeOrderValue(edge);
                    const existing = minIncomingOrder.has(targetId) ? minIncomingOrder.get(targetId) : Number.MAX_SAFE_INTEGER;
                    minIncomingOrder.set(targetId, Math.min(existing, value));
                });

                const groups = new Map();
                nodes.forEach(node => {
                    const level = levels.get(node.id()) || 0;
                    if (!groups.has(level)) groups.set(level, []);
                    const order = minIncomingOrder.get(node.id());
                    groups.get(level).push({ node, order: Number.isFinite(order) ? order : Number.MAX_SAFE_INTEGER });
                });

                const xSpacing = 220;
                const ySpacing = 110;
                [...groups.keys()].sort((a, b) => a - b).forEach(level => {
                    const items = groups.get(level).sort((a, b) => (
                        a.order - b.order ||
                        String(a.node.data("label")).localeCompare(String(b.node.data("label")))
                    ));
                    const offset = (items.length - 1) / 2;
                    items.forEach((item, index) => {
                        item.node.position({ x: level * xSpacing, y: (index - offset) * ySpacing });
                    });
                });
            }

            const layout = cy.layout(isLargeGraph ? {
                name: "cose",
                animate: false,
                fit: true,
                padding: 50,
                nodeRepulsion: 4000,
                nodeOverlap: 10,
                idealEdgeLength: 100,
                edgeElasticity: 100,
                nestingFactor: 5,
                gravity: 80,
                numIter: 1000,
                initialTemp: 200,
                coolingFactor: 0.95,
                minTemp: 1.0
            } : isSearchGraph ? {
                name: "breadthfirst",
                animate: false,
                fit: true,
                directed: true,
                padding: 18,
                spacingFactor: 0.82,
                circle: false,
                grid: false,
                maximal: false
            } : isFileDependencyGraph ? {
                name: "cose",
                animate: false,
                fit: true,
                padding: 28,
                nodeRepulsion: 9000,
                nodeOverlap: 20,
                idealEdgeLength: 150,
                edgeElasticity: 80,
                nestingFactor: 4,
                gravity: 50,
                numIter: 1400,
                initialTemp: 250,
                coolingFactor: 0.95,
                minTemp: 1.0
            } : (applyOrderedTierLayout(), {
                name: "preset",
                animate: false,
                fit: true,
                padding: 60
            }));

            layout.on("layoutstop", () => {
                cy.resize();
                cy.fit(undefined, isSearchGraph ? 14 : (isFileDependencyGraph ? 28 : 50));
                statusEl.textContent = `${GRAPH_TITLE}: loaded ${nodeSet.size} nodes and ${edges.length} edges (${graphMode}). Drag or scroll to explore.`;
            });

            layout.run();
            cy.on('tap', 'node', function(evt) {
                const fn = evt.target.data('id');
                if (typeof gtag === 'function') {
                    gtag('event', 'callgraph_interaction', {
                        'function_name': fn
                    });
                }
            });
            setTimeout(() => {
                cy.resize();
                cy.fit(undefined, isSearchGraph ? 14 : (isFileDependencyGraph ? 28 : 50));
                if (statusEl.textContent.startsWith("Loading")) {
                    statusEl.textContent = `${GRAPH_TITLE}: loaded ${nodeSet.size} nodes and ${edges.length} edges (${graphMode}). Drag or scroll to explore.`;
                }
            }, 1200);
            if (isLargeGraph) {
                cy.zoom(0.55);
                cy.center();
            } else if (isSearchGraph) {
                cy.zoom(Math.min(cy.zoom(), 0.68));
                cy.center();
            } else if (isFileDependencyGraph) {
                cy.zoom(Math.min(cy.zoom(), 0.82));
                cy.center();
            }
        } catch (err) {
            statusEl.textContent = `Cytoscape render error: ${err.message}`;
            console.error(err);
        }


    })
    .catch(err => {
        statusEl.textContent = err.message;
        console.error(err);
    });
</script>

</body>
</html>
