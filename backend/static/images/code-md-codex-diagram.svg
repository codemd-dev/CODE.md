<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">How code.md helps Codex understand a repository</title>
  <desc id="desc">A website-ready diagram showing that code.md gives Codex a factual repo map before it works, reducing guessing and improving code navigation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.48" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f7fb"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3267e3"/>
      <stop offset="1" stop-color="#1f4fbf"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24b47e"/>
      <stop offset="1" stop-color="#158765"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .title { font-size: 40px; font-weight: 850; fill: #101828; letter-spacing: -0.4px; }
      .subtitle { font-size: 18px; fill: #475467; }
      .panel-title { font-size: 22px; font-weight: 800; fill: #101828; }
      .small-title { font-size: 15px; font-weight: 800; fill: #101828; }
      .body { font-size: 15px; fill: #475467; }
      .body-dark { font-size: 15px; fill: #1f2937; }
      .tiny { font-size: 12px; fill: #667085; }
      .pill { font-size: 13px; font-weight: 750; fill: #1d4ed8; }
      .white { fill: #ffffff; }
      .muted { fill: #667085; }
      .line { stroke: #d0d5dd; stroke-width: 2; fill: none; }
      .arrow { stroke: #3267e3; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .green-arrow { stroke: #24b47e; stroke-width: 3; fill: none; marker-end: url(#greenArrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3267e3"/>
    </marker>
    <marker id="greenArrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#24b47e"/>
    </marker>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="692" rx="28" fill="#ffffff" stroke="#e4e7ec"/>

  <text x="80" y="92" class="font title">How code.md helps Codex work on your repo</text>
  <text x="80" y="124" class="font subtitle">One factual repo map gives the agent context before it edits code.</text>

  <g transform="translate(80 166)">
    <rect width="320" height="160" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="24" y="40" class="font panel-title">Without code.md</text>
    <text x="24" y="72" class="font body">Codex starts cold.</text>
    <text x="24" y="100" class="font body">It must search files, infer structure,</text>
    <text x="24" y="124" class="font body">and guess which code paths matter.</text>
    <circle cx="272" cy="52" r="22" fill="#fb923c"/>
    <text x="263" y="60" class="font white" font-size="24" font-weight="900">?</text>
  </g>

  <path d="M424 246 C470 246, 500 246, 544 246" class="arrow"/>

  <g transform="translate(568 148)" filter="url(#shadow)">
    <rect width="280" height="196" rx="20" fill="#ffffff" stroke="#d0d5dd"/>
    <rect x="0" y="0" width="280" height="54" rx="20" fill="url(#blue)"/>
    <path d="M0 34 H280 V54 H0 Z" fill="url(#blue)"/>
    <text x="24" y="35" class="font white" font-size="22" font-weight="850">code.md</text>
    <text x="24" y="84" class="font small-title">Machine-generated structural truth</text>
    <text x="24" y="114" class="font body">Generated from repo analysis.</text>
    <text x="24" y="138" class="font body">Built to brief coding agents.</text>
    <text x="24" y="162" class="font body">Facts first. No silent guessing.</text>
  </g>

  <path d="M872 246 C922 246, 952 246, 1000 246" class="green-arrow"/>

  <g transform="translate(812 166)">
    <rect width="308" height="160" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="24" y="40" class="font panel-title">With code.md</text>
    <text x="24" y="72" class="font body">Codex starts with a repo map.</text>
    <text x="24" y="100" class="font body">It can find the right files faster</text>
    <text x="24" y="124" class="font body">and explain evidence more clearly.</text>
    <circle cx="260" cy="52" r="22" fill="#24b47e"/>
    <path d="M250 52 l7 8 l14 -18" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(80 382)">
    <text x="0" y="0" class="font panel-title">What Codex sees in one file</text>
    <text x="0" y="28" class="font body">A compact, factual briefing before opening the codebase.</text>

    <g transform="translate(0 62)">
      <rect width="235" height="86" rx="14" fill="#f8fafc" stroke="#e4e7ec"/>
      <text x="18" y="30" class="font small-title">Callgraph</text>
      <text x="18" y="56" class="font body">Who calls what, and</text>
      <text x="18" y="76" class="font body">which functions are connected.</text>
    </g>

    <g transform="translate(255 62)">
      <rect width="235" height="86" rx="14" fill="#f8fafc" stroke="#e4e7ec"/>
      <text x="18" y="30" class="font small-title">File dependencies</text>
      <text x="18" y="56" class="font body">Which files depend on</text>
      <text x="18" y="76" class="font body">other files.</text>
    </g>

    <g transform="translate(510 62)">
      <rect width="235" height="86" rx="14" fill="#f8fafc" stroke="#e4e7ec"/>
      <text x="18" y="30" class="font small-title">UI surfaces</text>
      <text x="18" y="56" class="font body">Buttons, links, forms,</text>
      <text x="18" y="76" class="font body">inputs, and screens.</text>
    </g>

    <g transform="translate(765 62)">
      <rect width="235" height="86" rx="14" fill="#f8fafc" stroke="#e4e7ec"/>
      <text x="18" y="30" class="font small-title">Source inventory</text>
      <text x="18" y="56" class="font body">What files were actually</text>
      <text x="18" y="76" class="font body">analyzed.</text>
    </g>

    <g transform="translate(0 168)">
      <rect width="235" height="86" rx="14" fill="#f8fafc" stroke="#e4e7ec"/>
      <text x="18" y="30" class="font small-title">Architecture clues</text>
      <text x="18" y="56" class="font body">Modules, entry points,</text>
      <text x="18" y="76" class="font body">and graph roots.</text>
    </g>

    <g transform="translate(255 168)">
      <rect width="235" height="86" rx="14" fill="#f8fafc" stroke="#e4e7ec"/>
      <text x="18" y="30" class="font small-title">Risk signals</text>
      <text x="18" y="56" class="font body">Highly connected code</text>
      <text x="18" y="76" class="font body">and change impact.</text>
    </g>

    <g transform="translate(510 168)">
      <rect width="235" height="86" rx="14" fill="#f8fafc" stroke="#e4e7ec"/>
      <text x="18" y="30" class="font small-title">Evidence policy</text>
      <text x="18" y="56" class="font body">What is factual, missing,</text>
      <text x="18" y="76" class="font body">or unavailable.</text>
    </g>

    <g transform="translate(765 168)">
      <rect width="235" height="86" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="18" y="30" class="font small-title">Less guessing</text>
      <text x="18" y="56" class="font body">The agent starts from</text>
      <text x="18" y="76" class="font body">repo evidence.</text>
    </g>
  </g>

  <g transform="translate(80 672)">
    <rect width="1040" height="54" rx="16" fill="#101828"/>
    <text x="24" y="34" class="font white" font-size="17" font-weight="760">Codex truth:</text>
    <text x="130" y="34" class="font white" font-size="17">code.md helps because it gives me a factual starting map before I search, explain, or edit.</text>
  </g>

  <text x="80" y="646" class="font tiny">Like design.md gives agents product and design context, code.md gives agents codebase structure and evidence.</text>
</svg>
